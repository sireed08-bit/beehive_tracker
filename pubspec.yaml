name: apis_intel
description: Voice-first beekeeping BI platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.0
  http: ^1.1.0
  flutter_dotenv: ^6.0.0
  dynamic_color: ^1.6.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env