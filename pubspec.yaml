name: beehive_tracker_1
description: "ApisIntel BI - offline-first commercial beekeeping inspection app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (as requested: Provider or Riverpod).
  provider: ^6.1.2

  # Offline-first local storage.
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Voice interface for hands-free inspections.
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # Camera + Google APIs for media capture and upload.
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

  # Network and utility.
  http: ^1.2.2
  intl: ^0.20.2

  # Pixel/Material You integration.
  dynamic_color: ^1.7.0

  # Env-based secret handling for API keys.
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Required for Hive code generation when running build_runner.
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  # App icon and splash generation support requested in spec.
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  image_path: android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

flutter_native_splash:
  color: "#FFF8E1"
  android: true
